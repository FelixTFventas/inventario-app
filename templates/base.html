<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="manifest" href="/static/manifest.json">
<meta name="theme-color" content="#1abc9c">


<title>Inventario App</title>

<style>

body{
margin:0;
font-family: Arial, sans-serif;
display:flex;
background:#f5f6fa;
}

/* MENU LATERAL */

.sidebar{

width:220px;
background:#2c3e50;
color:white;
height:100vh;
padding:20px;
position:fixed;
left:0;
top:0;

}

.sidebar h2{
text-align:center;
margin-bottom:30px;
}

.sidebar a{

display:block;
color:white;
padding:12px;
text-decoration:none;
margin-top:10px;
background:#34495e;
border-radius:5px;
transition:0.3s;

}

.sidebar a:hover{
background:#1abc9c;
}

/* CONTENIDO */

.content{

margin-left:240px;
padding:30px;
width:100%;

}

/* BOTONES */

button{

background:#3498db;
color:white;
border:none;
padding:10px 15px;
border-radius:5px;
cursor:pointer;

}

button:hover{
background:#2980b9;
}

input, textarea{

padding:8px;
border:1px solid #ccc;
border-radius:5px;

}

</style>

</head>

<body>

<div class="sidebar">

<h2>Inventario</h2>

<a href="/">🏠 Dashboard</a>

<a href="/">🏢 Inmuebles</a>

<a href="/logout">🚪 Cerrar sesión</a>

</div>

<div class="content">

{% block contenido %}

{% endblock %}

</div>

<script>
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('/static/service-worker.js')
}
</script>

</body>
</html>
