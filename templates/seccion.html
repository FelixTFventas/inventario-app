{% extends "base.html" %}

{% block contenido %}

<h1>{{ seccion.nombre }}</h1>

<hr>

<h2>Subir Fotos o Videos</h2>

<form action="/subir_foto/{{ seccion.id }}" method="POST" enctype="multipart/form-data">

<input type="file"
name="fotos"
multiple
accept="image/*,video/*"
capture="environment">

<br><br>

<button type="submit">📤 Subir archivos</button>

</form>
<hr>

<h2>Galería</h2>

<link href="https://cdn.jsdelivr.net/npm/lightbox2@2/dist/css/lightbox.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/lightbox2@2/dist/js/lightbox.min.js"></script>

<div style="display:flex; flex-wrap:wrap; gap:20px;">

{% for foto in fotos %}

<div style="border:1px solid #ccc; padding:10px; border-radius:8px; background:white">

{% if foto.archivo.endswith('.mp4') %}

<video width="250" controls>
<source src="/static/uploads/{{ foto.archivo }}">
</video>

{% else %}

<a href="/static/uploads/{{ foto.archivo }}" data-lightbox="galeria">

<img src="/static/uploads/{{ foto.archivo }}" width="250" style="border-radius:8px">

</a>

{% endif %}

</div>

{% endfor %}

</div>

<hr>

<h2>Observaciones</h2>

<form action="/crear_observacion/{{ seccion.id }}" method="POST">

<textarea name="comentario" rows="4" cols="50" placeholder="Escribe una observación"></textarea>

<br><br>

<button type="submit">Guardar observación</button>

</form>

<br>

{% for o in observaciones %}

<div style="background:#f5f5f5; padding:10px; margin-bottom:10px; border-radius:5px">
{{ o.comentario }}
</div>

{% endfor %}

<hr>

<a href="/inventario/{{ inventario_id }}">
<button>⬅ Volver al inventario</button>
</a>

<a href="/">
<button>🏠 Inicio</button>
</a>

{% endblock %}
